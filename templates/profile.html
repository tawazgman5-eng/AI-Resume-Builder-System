<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: #f0f4f8;
      color: #333;
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      padding: 50px 20px 30px;
      text-align: center;
    }
    .hero h1 { margin: 0; font-size: 2.2rem; }

    /* Container */
    .container {
      max-width: 500px;
      margin: -30px auto 40px;
      background: white;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      position: relative;
    }

    h2, h3 { color: #1e3c72; margin-bottom: 15px; }
    p { font-size: 16px; margin: 8px 0; }

    /* Form */
    form input {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #1e3c72;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      position: relative;
    }

    button:hover { background: #2a5298; }

    /* Password Strength Meter */
    .strength-meter {
      height: 6px;
      width: 100%;
      background: #ddd;
      border-radius: 3px;
      margin-top: -5px;
      margin-bottom: 10px;
    }
    .strength-meter span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: 3px;
      transition: width 0.3s;
    }
    .strength-weak { background: #ff4b5c; }
    .strength-medium { background: #ffa500; }
    .strength-strong { background: #4caf50; }

    /* Spinner */
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #1e3c72;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      position: absolute;
      top: 15px;
      right: 15px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Message */
    .message {
      margin-top: 12px;
      font-size: 14px;
      color: green;
      text-align: center;
      transition: transform 0.3s, opacity 0.3s;
    }
    .shake {
      animation: shake 0.4s;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
    }
    .success {
      color: #4caf50;
      transform: scale(1.05);
    }

    .back-link { margin-top: 20px; display: block; text-align: center; }
    .back-link a { color: #1e3c72; text-decoration: none; font-weight: 500; }
    .back-link a:hover { text-decoration: underline; }

    @media (max-width: 500px) {
      .container { margin: -20px 20px 20px; padding: 25px 20px; }
      .hero h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

<section class="hero">
  <h1>User Profile</h1>
</section>

<div class="container">
  <h2>Profile Details</h2>
  <p><strong>Name:</strong> {{ user.full_name }}</p>
  <p><strong>Email:</strong> {{ user.email }}</p>

  <h3>Change Password</h3>
  <form method="POST" id="passwordForm">
    <input type="password" name="old_password" placeholder="Current Password" required>
    <input type="password" name="new_password" id="new_password" placeholder="New Password" required>
    <div class="strength-meter" id="strengthMeter"><span></span></div>
    <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm New Password" required>
    <button type="submit">Update Password</button>
    <div class="spinner" id="spinner"></div>
  </form>

  <div class="message" id="message">{{ message }}</div>

  <div class="back-link">
    <a href="/dashboard">Back to Dashboard</a>
  </div>
</div>

<script>
  const newPassword = document.getElementById('new_password');
  const confirmPassword = document.getElementById('confirm_password');
  const strengthBar = document.getElementById('strengthMeter').firstElementChild;
  const passwordForm = document.getElementById('passwordForm');
  const spinner = document.getElementById('spinner');
  const message = document.getElementById('message');

  // Password strength meter
  newPassword.addEventListener('input', () => {
    const val = newPassword.value;
    let strength = 0;
    if(val.length >= 6) strength++;
    if(/[A-Z]/.test(val)) strength++;
    if(/[0-9]/.test(val)) strength++;
    if(/[^A-Za-z0-9]/.test(val)) strength++;

    switch(strength) {
      case 0: case 1: strengthBar.style.width='25%'; strengthBar.className='strength-weak'; break;
      case 2: strengthBar.style.width='50%'; strengthBar.className='strength-medium'; break;
      case 3: case 4: strengthBar.style.width='100%'; strengthBar.className='strength-strong'; break;
    }
  });

  // Form submit with spinner and animations
  passwordForm.addEventListener('submit', e => {
    e.preventDefault();
    message.textContent = '';

    if(newPassword.value !== confirmPassword.value) {
      // Shake animation on fail
      message.textContent = "Passwords do not match";
      message.classList.remove('success');
      message.classList.add('shake');
      setTimeout(() => message.classList.remove('shake'), 400);
      return;
    }

    // Show spinner
    spinner.style.display = 'inline-block';

    // Simulate async password update
    setTimeout(() => {
      spinner.style.display = 'none';
      message.textContent = "Password updated successfully!";
      message.classList.add('success');
      passwordForm.reset();
      strengthBar.style.width = '0%';
    }, 1500);
  });
</script>

</body>
</html>
