<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: #f0f4f8;
      color: #333;
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      padding: 80px 20px 40px;
      text-align: center;
    }

    .hero h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1.1rem;
      opacity: 0.85;
    }

    /* Container */
    .container {
      max-width: 450px;
      margin: -40px auto 40px;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    /* Tabs */
    .tabs {
      display: flex;
      margin-bottom: 25px;
      border-bottom: 2px solid #e0e0e0;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      cursor: pointer;
      font-weight: 500;
      color: #555;
      transition: 0.3s;
    }

    .tab.active {
      color: #1e3c72;
      border-bottom: 3px solid #1e3c72;
    }

    /* Form */
    form input {
      width: 100%;
      padding: 12px 15px;
      margin: 12px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #1e3c72;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2a5298;
    }

    .login-link {
      margin-top: 15px;
      text-align: center;
    }

    .login-link a {
      color: #1e3c72;
      text-decoration: none;
      font-weight: 500;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 500px) {
      .container {
        margin: -20px 20px 20px;
        padding: 30px;
      }
      .hero h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Join Resume Builder</h1>
    <p>Create your professional resume in minutes</p>
  </section>

  <!-- Register Form Container -->
  <div class="container">

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active">Register</div>
      <div class="tab" onclick="window.location.href='/login'">Login</div>
    </div>

    <!-- Form -->
    <form method="POST">
      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Register</button>
    </form>

    <div class="login-link">
      <p>Already have an account? <a href="/login">Login</a></p>
    </div>
  </div>

</body>
</html>
