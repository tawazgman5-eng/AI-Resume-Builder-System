 <!DOCTYPE html>
<html>
<head>
    <title>{{ data.name }} - Resume</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; }
        h1, h2 { color: #444; }
        .section { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>{{ data.name }}</h1>
    <p><strong>Email:</strong> {{ data.email }} | <strong>Phone:</strong> {{ data.phone }}</p>

    <div class="section">
        <h2>Education</h2>
        <p>{{ data.education }}</p>
    </div>

    <div class="section">
        <h2>Experience</h2>
        <p>{{ data.experience }}</p>
    </div>

    <div class="section">
        <h2>Skills</h2>
        <p>{{ data.skills }}</p>
    </div>
</body>
</html>
