<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: #f0f4f8;
      color: #333;
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      padding: 60px 20px 30px;
      text-align: center;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1.1rem;
      opacity: 0.85;
    }

    /* Form Container */
    .container {
      max-width: 450px;
      margin: -30px auto 40px;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    form input {
      width: 100%;
      padding: 12px 15px;
      margin: 12px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #1e3c72;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2a5298;
    }

    .login-link {
      margin-top: 15px;
      text-align: center;
    }

    .login-link a {
      color: #1e3c72;
      text-decoration: none;
      font-weight: 500;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .message {
      margin-top: 12px;
      font-size: 14px;
      color: green;
    }

    @media (max-width: 500px) {
      .container {
        margin: -20px 20px 20px;
        padding: 30px;
      }
      .hero h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Forgot Password</h1>
    <p>Enter your email to receive a password reset link</p>
  </section>

  <!-- Form Container -->
  <div class="container">
    <form method="POST" id="forgotForm">
      <input type="email" name="email" id="email" placeholder="Enter your email" required>
      <button type="submit">Send Reset Link</button>
    </form>

    <div class="message" id="message">{{ message }}</div>

    <div class="login-link">
      <a href="/login">Back to Login</a>
    </div>
  </div>

</body>
</html>
