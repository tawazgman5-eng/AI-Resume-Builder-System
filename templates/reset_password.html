<!DOCTYPE html>
<html>
<body>

<h2>Reset Password</h2>

<form method="POST">
    <input type="password" name="password" placeholder="New Password" required><br>
    <input type="password" name="confirm" placeholder="Confirm Password" required><br>
    <button type="submit">Reset Password</button>
</form><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: #f0f4f8;
      color: #333;
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      padding: 60px 20px 30px;
      text-align: center;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1.1rem;
      opacity: 0.85;
    }

    /* Form Container */
    .container {
      max-width: 450px;
      margin: -30px auto 40px;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    form input {
      width: 100%;
      padding: 12px 15px;
      margin: 12px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #1e3c72;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2a5298;
    }

    .strength-meter {
      height: 6px;
      width: 100%;
      background: #ddd;
      border-radius: 3px;
      margin-top: -5px;
      margin-bottom: 15px;
    }

    .strength-meter span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: 3px;
      transition: width 0.3s;
    }

    .strength-weak { background: #ff4b5c; }
    .strength-medium { background: #ffa500; }
    .strength-strong { background: #4caf50; }

    .message {
      margin-top: 15px;
      color: #e74c3c;
      font-size: 14px;
    }

    @media (max-width: 500px) {
      .container {
        margin: -20px 20px 20px;
        padding: 30px;
      }
      .hero h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Reset Your Password</h1>
    <p>Enter a new secure password to continue</p>
  </section>

  <!-- Form Container -->
  <div class="container">
    <form method="POST" id="resetForm">
      <input type="password" name="password" id="password" placeholder="New Password" required>
      <div class="strength-meter" id="strengthMeter"><span></span></div>

      <input type="password" name="confirm" id="confirm" placeholder="Confirm Password" required>
      <div class="message" id="confirmMessage"></div>

      <button type="submit">Reset Password</button>
    </form>
  </div>

  <script>
    const passwordInput = document.getElementById('password');
    const strengthBar = document.getElementById('strengthMeter').firstElementChild;
    const confirmInput = document.getElementById('confirm');
    const confirmMessage = document.getElementById('confirmMessage');
    const resetForm = document.getElementById('resetForm');

    // Password strength meter
    passwordInput.addEventListener('input', () => {
      const val = passwordInput.value;
      let strength = 0;
      if(val.length >= 6) strength++;
      if(/[A-Z]/.test(val)) strength++;
      if(/[0-9]/.test(val)) strength++;
      if(/[^A-Za-z0-9]/.test(val)) strength++;

      switch(strength) {
        case 0:
        case 1: strengthBar.style.width = '25%'; strengthBar.className = 'strength-weak'; break;
        case 2: strengthBar.style.width = '50%'; strengthBar.className = 'strength-medium'; break;
        case 3:
        case 4: strengthBar.style.width = '100%'; strengthBar.className = 'strength-strong'; break;
      }
    });

    // Confirm password validation
    confirmInput.addEventListener('input', () => {
      if(confirmInput.value !== passwordInput.value) {
        confirmMessage.textContent = "Passwords do not match";
      } else {
        confirmMessage.textContent = "";
      }
    });

    // Prevent form submission if passwords don't match
    resetForm.addEventListener('submit', e => {
      if(confirmInput.value !== passwordInput.value) {
        e.preventDefault();
        confirmMessage.textContent = "Passwords do not match";
      }
    });
  </script>
</body>
</html>


<p>{{ message }}</p>

</body>
</html>
